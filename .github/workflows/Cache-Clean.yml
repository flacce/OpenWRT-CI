# CI 项目名称
name: 缓存清理

# CI 触发计划
on:
  # 自动触发：每周日 UTC 时间 20:00
  schedule:
    - cron: 0 20 * * 0
  # 手动触发：允许手动运行此工作流程
  workflow_dispatch:

# CI 任务权限
# 给予所有任务读写权限
permissions: write-all

# 环境变量
env:
  # 设置 GitHub Token，用于 gh 命令认证
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

# CI 执行任务
jobs:
  cleanup:
    # 任务名称
    name: 清理 Actions 缓存
    # 运行环境
    runs-on: ubuntu-latest
    # 任务步骤
    steps:
      # 步骤1：检出项目代码
      - name: 检出项目代码
        uses: actions/checkout@main

      # 步骤2：执行缓存清理
      - name: 清理全部缓存
        # 使用 GitHub CLI (gh) 删除所有缓存
        run: gh cache delete --all