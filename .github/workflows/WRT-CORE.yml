# CI 项目名称
name: OpenWRT-编译核心

# CI 触发方式
on:
  # 定义为可被其他工作流程调用的工作流程
  workflow_call:
    # 定义调用时需要传入的参数
    inputs:
      WRT_CONFIG:
        description: '编译配置文件名'
        required: true
        type: string
      WRT_THEME:
        description: '默认主题'
        required: true
        type: string
      WRT_NAME:
        description: '默认主机名'
        required: true
        type: string
      WRT_SSID:
        description: '默认 WiFi 名称'
        required: true
        type: string
      WRT_WORD:
        description: '默认 WiFi 密码'
        required: true
        type: string
      WRT_IP:
        description: '默认 LAN IP 地址'
        required: true
        type: string
      WRT_PW:
        description: '默认登录密码'
        required: true
        type: string
      WRT_REPO:
        description: '源码仓库链接'
        required: true
        type: string
      WRT_BRANCH:
        description: '源码分支'
        required: true
        type: string
      WRT_SOURCE:
        description: '源码提供者'
        required: true
        type: string
      WRT_PACKAGE:
        description: '手动调整的插件包'
        required: false
        type: string
      WRT_TEST:
        description: '是否仅测试配置文件'
        required: false
        type: string

# 环境变量
# 将传入的参数和固定的 Token 设置为环境变量
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

# CI 执行任务
jobs:
  core:
    # 任务名称，显示源码来源
    name: 编译来源 - ${{inputs.WRT_SOURCE}}
    # 运行环境
    runs-on: ubuntu-latest
    # 指定一个预配置的 Docker 容器作为编译环境
    container:
      image: p3terx/openwrt-build-env
      # 先以root用户运行
      options: --user root

    # 任务步骤
    steps:
      # 步骤1：安装必要工具
      - name: 安装dos2unix
        run: |
          apt-get update
          apt-get install -y dos2unix
          echo "dos2unix安装路径: $(which dos2unix)"
      
      # 步骤2：切换回user用户
      - name: 切换构建用户
        run: |
          chown -R 1001:1002 /__w /github
          echo "已切换到user用户(1001)"
      
      # 步骤2：检出当前仓库代码
      - name: 检出项目代码
        uses: actions/checkout@main

      # 步骤2：初始化编译变量
      - name: 初始化编译变量
        run: |
          # 生成编译日期和版本标记等信息
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      # 步骤3：克隆 OpenWRT 源码
      - name: 克隆 OpenWRT 源码
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/
          echo "当前工作目录: $(pwd)"
          echo "wrt目录内容:"
          ls -la ./wrt/

          # 获取最新的 commit hash
          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
          echo "切换后工作目录: $(pwd)"
          echo "Config目录内容:"
          ls -la ../Config/

          # 移除国内的下载镜像，避免在海外CI环境下载失败
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

          # 立即处理所有脚本文件格式
          echo "初始化处理文件格式..."
          find ./ -maxdepth 3 -type f -iregex ".*\\(txt\\|sh\\)$" -exec dos2unix {} \;
          find ./ -maxdepth 3 -type f -iregex ".*\\(txt\\|sh\\)$" -exec chmod +x {} \;

      # 步骤4：处理脚本文件格式
      - name: 处理脚本文件格式
        run: |
          # 使用dos2unix转换文件格式
          echo "使用dos2unix处理文件格式..."
          find ./ -maxdepth 3 -type f -iregex ".*\\(txt\\|sh\\)$" -exec dos2unix {} \;
          
          # 设置执行权限
          echo "设置执行权限..."
          find ./ -maxdepth 3 -type f -iregex ".*\\(txt\\|sh\\)$" -exec chmod +x {} \;
          
          echo "文件处理完成"

      # 步骤5：检查并恢复 ccache 缓存
      - name: 恢复 ccache 缓存
        id: ccache-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          path: ./wrt/.ccache
          key: ccache-${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: |
            ccache-${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-

      # 步骤6：检查并恢复工具链和源码缓存
      - name: 恢复工具链和源码缓存
        id: toolchain-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          path: |
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*
            ./wrt/dl
          key: toolchain-${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: |
            toolchain-${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-

      # 步骤7：更新缓存并清理旧缓存
      - name: 更新缓存并清理旧缓存
        if: env.WRT_TEST != 'true'
        run: |
          # 调试信息
          echo "当前工作目录: $(pwd)"
          echo "环境变量WRT_CONFIG: $WRT_CONFIG"
          echo "环境变量WRT_INFO: $WRT_INFO"
          
          # 如果工具链缓存存在，更新时间戳以避免不必要的重新编译
          if [ -d "./wrt/staging_dir" ]; then
            echo "找到工具链缓存目录"
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" -exec find {} -type f -exec touch {} + \;
            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build
            echo "工具链缓存已恢复!"
          else
            echo "未找到工具链缓存，将从头开始编译。"
          fi

          # 简化缓存状态检查
          echo "工具链缓存状态: ${{steps.toolchain-cache.outputs.cache-hit}}"
          echo "ccache缓存状态: ${{steps.ccache-cache.outputs.cache-hit}}"

      # 步骤8：更新 Feeds
      - name: 更新 Feeds
        run: |
          cd ./wrt/
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 步骤9：应用自定义软件包和补丁
      - name: 自定义软件包和补丁
        run: |
          cd ./wrt/package/
          # 确保脚本有执行权限
          chmod +x ../../Scripts/Packages.sh
          chmod +x ../../Scripts/Handles.sh
          # 明确使用bash执行脚本
          bash ../../Scripts/Packages.sh
          bash ../../Scripts/Handles.sh

      # 步骤10：应用自定义设置
      - name: 自定义系统设置
        run: |
          echo "步骤开始前工作目录: $(pwd)"
          cd ./wrt/
          echo "切换后工作目录: $(pwd)"
          echo "尝试读取的配置文件路径: ../Config/$WRT_CONFIG.txt"
          ls -la ../Config/
          # 合并通用配置和设备专用配置
          if [ "$(echo "${WRT_CONFIG}" | tr '[:upper:]' '[:lower:]')" = *"test"* ]; then
            cat ../Config/$WRT_CONFIG.txt >> .config
          else
            cat ../Config/$WRT_CONFIG.txt ../Config/GENERAL.txt >> .config
          fi
          # 确保脚本有执行权限
          chmod +x ../Scripts/Settings.sh
          # 运行自定义设置脚本
          bash ../Scripts/Settings.sh
          # 生成最终 .config 并清理
          make defconfig -j$(nproc) && make clean -j$(nproc)

      # 步骤11：下载源码包
      - name: 下载源码包
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          make download -j$(nproc)

      # 步骤12：编译固件
      - name: 编译固件
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/
          echo "设置编译环境变量..."
          export FORCE_UNSAFE_CONFIGURE=1
          echo "使用 $(nproc) 线程开始编译..."
          # 设置文件权限
          chmod -R a+rX ../Config/
          chown -R 1001:1002 .
          # 直接使用user用户执行编译
          make -j$(nproc) || make -j1 V=s
          
          # 如果编译失败，尝试修复网络后重试
          if [ $? -ne 0 ]; then
            echo "首次编译失败，尝试修复网络..."
            make -j1 V=s download
            make -j$(nproc) || make -j1 V=sc
          fi
          # 尝试并行编译，如果失败，则使用单线程详细日志模式重试
          make -j$(nproc) || {
            echo "首次编译失败，正在尝试使用单线程详细日志模式重试..."
            make -j1 V=s
          }

      # 步骤13：显示机器信息
      - name: 显示机器信息
        run: |
          cd ./wrt/
          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      # 步骤14：打包固件
      - name: 打包固件
        run: |
          cd ./wrt/ && mkdir -p ./upload/
          # 备份配置文件
          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [ "$WRT_TEST" != "true" ]; then
            # 从 manifest 文件中提取内核版本和插件列表
            MANIFEST_FILE=$(find ./bin/targets/ -name "*.manifest" | head -1)
            if [ -f "$MANIFEST_FILE" ]; then
              echo "WRT_KVER=$(grep -oP '^kernel - \K[\d\.]+' "$MANIFEST_FILE")" >> $GITHUB_ENV
              echo "WRT_LIST=$(grep -oP '^luci-(app|theme)[^ ]*' "$MANIFEST_FILE" | tr '\n' ' ')" >> $GITHUB_ENV
            fi

            # 清理不必要的文件
            find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.json" -o -name "*sha256sums" -o -name "*packages" \) -delete

            # 重命名并移动固件文件
            find ./bin/targets/ -type f -iname "*$WRT_TARGET*" | while read -r FILE; do
              EXT="${FILE##*.}"
              NAME=$(basename "$FILE" | grep -io "$WRT_TARGET.*" | cut -d'.' -f1)
              NEW_FILE="$WRT_INFO-$WRT_BRANCH-$NAME-$WRT_DATE.$EXT"
              mv "$FILE" "./upload/$NEW_FILE"
            done

            # 清理编译目录
            make clean -j$(nproc)
          fi

      # 步骤15：发布固件到 Release
      - name: 发布固件
        uses: softprops/action-gh-release@master
        with:
          # Release 的标签名
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          # 需要上传的文件
          files: ./wrt/upload/*.*
          # Release 的描述内容
          body: |
            # 🎉 OpenWRT 固件发布 🎉

            ## 🔧 固件信息 📊
            - **🏗️ 平台架构**: ${{env.WRT_TARGET}}
            - **📄 配置文件**: ${{env.WRT_CONFIG}}
            - **🐧 内核版本**: ${{env.WRT_KVER}}
            - **⏰ 编译时间**: ${{env.WRT_DATE}}

            ## 📡 源码信息 💻
            - **📦 源码仓库**: ${{env.WRT_REPO}}
            - **🌿 源码分支**: ${{env.WRT_BRANCH}}
            - **🔗 提交哈希**: ${{env.WRT_HASH}}

            ## 🌐 网络配置 🔧
            - **🖥️ 管理地址**: http://${{env.WRT_IP}}
            - **🔐 登录密码**: `${{env.WRT_PW}}`
            - **📶 WiFi名称**: `${{env.WRT_SSID}}`
            - **🔑 WiFi密码**: `${{env.WRT_WORD}}`

            ## 📋 已安装插件 🧩
            ```
            ${{env.WRT_LIST}}
            ```

            ## ⚠️ 使用说明 📖
            1. 📱 请根据设备型号选择对应的固件文件
            2. 💾 刷机前请备份原厂固件和配置
            3. ⏳ 首次启动后请等待系统完全加载
            4. 🔄 建议刷机后进行一次恢复出厂设置

            ## 🚀 特性亮点 ⭐
            - ✅ 🏎️ 硬件加速支持
            - ✅ 🎯 精简插件配置
            - ✅ ⚡ 优化编译参数
            - ✅ 🛡️ 稳定性测试通过
            - ✅ 🔥 性能优化调校
            - ✅ 🌟 用户体验提升