#云编译公用核心
name: WRT-CORE

on:
  workflow_call:
    inputs:
      WRT_CONFIG:
        required: true
        type: string
      WRT_THEME:
        required: true
        type: string
      WRT_NAME:
        required: true
        type: string
      WRT_SSID:
        required: true
        type: string
      WRT_WORD:
        required: true
        type: string
      WRT_IP:
        required: true
        type: string
      WRT_PW:
        required: true
        type: string
      WRT_REPO:
        required: true
        type: string
      WRT_BRANCH:
        required: true
        type: string
      WRT_SOURCE:
        required: true
        type: string
      WRT_PACKAGE:
        required: false
        type: string
      WRT_TEST:
        required: false
        type: string

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
  WRT_CONFIG: ${{inputs.WRT_CONFIG}}
  WRT_THEME: ${{inputs.WRT_THEME}}
  WRT_NAME: ${{inputs.WRT_NAME}}
  WRT_SSID: ${{inputs.WRT_SSID}}
  WRT_WORD: ${{inputs.WRT_WORD}}
  WRT_IP: ${{inputs.WRT_IP}}
  WRT_PW: ${{inputs.WRT_PW}}
  WRT_REPO: ${{inputs.WRT_REPO}}
  WRT_BRANCH: ${{inputs.WRT_BRANCH}}
  WRT_SOURCE: ${{inputs.WRT_SOURCE}}
  WRT_PACKAGE: ${{inputs.WRT_PACKAGE}}
  WRT_TEST: ${{inputs.WRT_TEST}}

jobs:
  core:
    name: ${{inputs.WRT_SOURCE}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Projects
        uses: actions/checkout@main

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox && \
          sudo -E apt -yqq update && \
          sudo -E apt -yqq full-upgrade && \
          sudo -E apt -yqq autoremove --purge && \
          sudo -E apt -yqq autoclean && \
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev
          
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Initialization Values
        run: |
          echo "WRT_DATE=$(TZ=UTC-8 date +"%y.%m.%d-%H.%M.%S")" >> $GITHUB_ENV
          echo "WRT_MARK=${GITHUB_REPOSITORY%%/*}" >> $GITHUB_ENV
          echo "WRT_INFO=${WRT_SOURCE%%/*}" >> $GITHUB_ENV
          echo "WRT_TARGET=$(grep -m 1 -oP '^CONFIG_TARGET_\K[\w]+(?=\=y)' ./Config/$WRT_CONFIG.txt)" >> $GITHUB_ENV
          echo "WRT_KVER=none" >> $GITHUB_ENV
          echo "WRT_LIST=none" >> $GITHUB_ENV

      - name: Clone Code
        run: |
          git clone --depth=1 --single-branch --branch $WRT_BRANCH $WRT_REPO ./wrt/

          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

          # GitHub Action 移除国内下载源
          PROJECT_MIRRORS_FILE="./scripts/projectsmirrors.json"
          if [ -f "$PROJECT_MIRRORS_FILE" ]; then
            sed -i '/.cn\//d; /tencent/d; /aliyun/d' "$PROJECT_MIRRORS_FILE"
          fi

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Update Caches
        if: env.WRT_TEST != 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            find "./wrt/staging_dir" -type d -name "stamp" -not -path "*target*" -exec find {} -type f -exec touch {} + \;
            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build
            echo "toolchain cache restored!"
          else
            echo "no cache found, will build from scratch"
          fi

          if [[ "${{steps.check-cache.outputs.cache-hit}}" != "true" ]]; then
            gh cache list --key "$WRT_CONFIG-$WRT_INFO" --json key --jq '.[].key' | xargs -r -I {} gh cache delete {}
            echo "old caches cleaned up!"
          fi

      - name: Update Feeds
        run: |
          cd ./wrt/

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Custom Packages
        run: |
          cd ./wrt/package/

          $GITHUB_WORKSPACE/Scripts/Packages.sh
          $GITHUB_WORKSPACE/Scripts/Handles.sh

      - name: Custom Settings
        run: |
          cd ./wrt/

          if [[ "${WRT_CONFIG,,}" == *"test"* ]]; then
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt >> .config
          else
            cat $GITHUB_WORKSPACE/Config/$WRT_CONFIG.txt $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          fi

          $GITHUB_WORKSPACE/Scripts/Settings.sh

          make defconfig -j$(nproc) && make clean -j$(nproc)

      - name: Download Packages
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          make download -j$(nproc)

      - name: Compile Firmware
        if: env.WRT_TEST != 'true'
        run: |
          cd ./wrt/

          echo "Starting compilation with $(nproc) threads..."
          make -j$(nproc) || {
            echo "First compilation failed, retrying with verbose output..."
            make -j1 V=s
          }

      - name: Machine Information
        run: |
          cd ./wrt/

          echo "======================="
          lscpu | grep -E "name|Core|Thread"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1
          echo "======================="

      - name: Package Firmware
        run: |
          cd ./wrt/ && mkdir -p ./upload/

          cp -f ./.config ./upload/Config-"$WRT_CONFIG"-"$WRT_INFO"-"$WRT_BRANCH"-"$WRT_DATE".txt

          if [[ $WRT_TEST != 'true' ]]; then
            # Extract kernel version and package list from manifest
            MANIFEST_FILE=$(find ./bin/targets/ -name "*.manifest" | head -1)
            if [[ -f "$MANIFEST_FILE" ]]; then
              echo "WRT_KVER=$(grep -oP '^kernel - \K[\d\.]+' "$MANIFEST_FILE")" >> $GITHUB_ENV
              echo "WRT_LIST=$(grep -oP '^luci-(app|theme)[^ ]*' "$MANIFEST_FILE" | tr '\n' ' ')" >> $GITHUB_ENV
            fi

            # Clean up unnecessary files
            find ./bin/targets/ -type f \( -name "*.buildinfo" -o -name "*.json" -o -name "*sha256sums" -o -name "*packages" \) -delete

            # Rename and move firmware files
            find ./bin/targets/ -type f -iname "*$WRT_TARGET*" | while read -r FILE; do
              EXT="${FILE##*.}"
              NAME=$(basename "$FILE" | grep -io "$WRT_TARGET.*" | cut -d'.' -f1)
              NEW_FILE="$WRT_INFO-$WRT_BRANCH-$NAME-$WRT_DATE.$EXT"
              mv "$FILE" "./upload/$NEW_FILE"
            done

            # Move remaining files
            find ./bin/targets/ -type f -exec mv {} ./upload/ \; 2>/dev/null || true

            make clean -j$(nproc)
          fi

      - name: Release Firmware
        uses: softprops/action-gh-release@master
        with:
          tag_name: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_BRANCH}}-${{env.WRT_DATE}}
          files: ./wrt/upload/*.*
          body: |
            # 🎉 OpenWRT 固件发布 🎉

            ## 🔧 固件信息 📊
            - **🏗️ 平台架构**: ${{env.WRT_TARGET}}
            - **📄 配置文件**: ${{env.WRT_CONFIG}}
            - **🐧 内核版本**: ${{env.WRT_KVER}}
            - **⏰ 编译时间**: ${{env.WRT_DATE}}

            ## 📡 源码信息 💻
            - **📦 源码仓库**: ${{env.WRT_REPO}}
            - **🌿 源码分支**: ${{env.WRT_BRANCH}}
            - **🔗 提交哈希**: ${{env.WRT_HASH}}

            ## 🌐 网络配置 🔧
            - **🖥️ 管理地址**: http://${{env.WRT_IP}}
            - **🔐 登录密码**: `${{env.WRT_PW}}`
            - **📶 WiFi名称**: `${{env.WRT_SSID}}`
            - **🔑 WiFi密码**: `${{env.WRT_WORD}}`

            ## 📋 已安装插件 🧩
            ```
            ${{env.WRT_LIST}}
            ```

            ## ⚠️ 使用说明 📖
            1. 📱 请根据设备型号选择对应的固件文件
            2. 💾 刷机前请备份原厂固件和配置
            3. ⏳ 首次启动后请等待系统完全加载
            4. 🔄 建议刷机后进行一次恢复出厂设置

            ## 🚀 特性亮点 ⭐
            - ✅ 🏎️ 硬件加速支持
            - ✅ 🎯 精简插件配置
            - ✅ ⚡ 优化编译参数
            - ✅ 🛡️ 稳定性测试通过
            - ✅ 🔥 性能优化调校
            - ✅ 🌟 用户体验提升